name: Generate Daily AI Artwork

on:
  schedule:
    # 18:00 UTC is exactly 02:00 AM Taiwan/China Time (UTC+8)
    - cron: '0 18 * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub Actions tab

jobs:
  build-and-generate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Execute the generator script
      - name: Run Daily Generator Script
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node daily-generator.js

      # 4. Commit and Push the generated image and updated mock-data.js
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generations/ mock-data.js
          
          # Only commit if changes exist
          if git diff --quiet && git diff --staged --quiet; then
            echo "No new artwork was generated (already exists for today)."
          else
            git commit -m "auto(art): generate daily artwork for $(date +'%Y-%m-%d') [skip ci]"
            git push origin main
          fi
